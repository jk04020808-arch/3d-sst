<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 模型三视图标注系统</title>
    <style>
        :root {
            --primary: #3b82f6;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: rgba(255, 255, 255, 0.5);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at 70% 50%, #111827 0%, #000 100%);
            color: var(--text); overflow: hidden;
        }

        .wrapper { display: flex; width: 100%; height: 100vh; }

        /* 左侧：3D 交互视口 (40%) */
        .left-panel { 
            width: 40%; height: 100%; 
            position: relative; border-right: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5); cursor: grab;
        }
        .left-panel:active { cursor: grabbing; }
        #bg-canvas { width: 100%; height: 100%; display: block; }

        /* HUD 工具栏 */
        .hud-toolbar {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 100;
        }
        .hud-btn {
            background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15); color: #fff;
            font-size: 11px; padding: 8px 14px; border-radius: 6px; cursor: pointer;
            font-weight: bold; letter-spacing: 1px; transition: 0.3s;
        }
        .hud-btn:hover { background: var(--primary); border-color: var(--primary); }

        /* 右侧：控制台 (60%) */
        .right-panel { 
            width: 60%; height: 100%; 
            overflow-y: auto; padding: 30px; 
            box-sizing: border-box; scrollbar-width: thin;
        }
        .right-panel::-webkit-scrollbar { width: 4px; }
        .right-panel::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        header { margin-bottom: 25px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px; }
        header h1 { font-size: 20px; font-weight: 800; letter-spacing: 2px; margin: 0; }
        header p { color: var(--text-dim); font-size: 10px; margin-top: 5px; letter-spacing: 2px; text-transform: uppercase; }

        .card { 
            background: var(--glass-bg); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 16px; 
            padding: 20px; margin-bottom: 20px;
        }

        #uploadCard { cursor: pointer; border: 1px dashed rgba(255,255,255,0.1); text-align: center; padding: 35px 20px; transition: 0.3s; }
        #uploadCard:hover { background: rgba(255,255,255,0.06); border-color: var(--primary); }

        .input-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; }
        .input-group label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 6px; font-weight: 700; }
        .input-group input { 
            width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; 
            font-size: 14px; background: rgba(0, 0, 0, 0.4); color: #fff; outline: none; box-sizing: border-box;
        }

        .btn { 
            background: rgba(255, 255, 255, 0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 12px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.3s; width: 100%;
        }
        .btn:hover { background: var(--primary); border-color: var(--primary); }

        /* 两列三视图展示 */
        .views-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; margin-top: 10px; 
        }
        .view-card { background: #fff; padding: 12px; border-radius: 12px; text-align: center; color: #000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        canvas.output-canvas { width: 100%; height: auto; display: block; border-radius: 6px; margin-bottom: 10px; }

        .hidden { display: none; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; display: none; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s infinite linear; }
        .status-tag { position: absolute; bottom: 20px; left: 20px; font-size: 9px; color: var(--primary); font-weight: 800; letter-spacing: 1px; background: rgba(0,0,0,0.5); padding: 6px 10px; border-radius: 4px; border: 1px solid var(--primary); }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <div style="margin-top:15px; letter-spacing: 3px; font-size: 11px; color: #aaa;">正在重组 15,000 粒子形态...</div>
</div>

<div class="wrapper">
    <!-- 左侧 (40%) -->
    <div class="left-panel" id="canvas-wrap">
        <div class="hud-toolbar hidden" id="hudTools">
            <div style="font-size: 10px; color: var(--text-dim); margin-bottom: 5px;">姿态校准</div>
            <button class="hud-btn" onclick="adjustOrientation('flip')">垂直翻转</button>
            <button class="hud-btn" onclick="adjustOrientation('rotX')">X轴旋转 90°</button>
            <button class="hud-btn" onclick="adjustOrientation('rotY')">Y轴旋转 90°</button>
        </div>
        <canvas id="bg-canvas"></canvas>
        <div class="status-tag">3D 实时粒子视口 (15,000 点)</div>
    </div>

    <!-- 右侧 (60%) -->
    <div class="right-panel">
        <header>
            <h1>3D 模型线稿标注系统</h1>
            <p>高清三视图控制台</p>
        </header>

        <div class="card" id="uploadCard">
            <div style="font-size: 14px; font-weight: 700;">上传 3D 模型</div>
            <p style="color: var(--text-dim); font-size: 11px; margin-top: 8px;">拖拽 GLB / GLTF 模型至此处</p>
            <input type="file" id="fileInput" accept=".glb,.gltf" style="display:none;">
        </div>

        <div class="card hidden" id="editCard">
            <div class="input-row">
                <div class="input-group"><label>长度尺寸 (L)</label><input type="text" id="valL" placeholder="输入数值"></div>
                <div class="input-group"><label>宽度尺寸 (W)</label><input type="text" id="valW" placeholder="输入数值"></div>
                <div class="input-group"><label>高度尺寸 (H)</label><input type="text" id="valH" placeholder="输入数值"></div>
            </div>
            <button class="btn" id="generateBtn" style="background: var(--primary);">确认生成高清标注图</button>
        </div>

        <div id="viewArea" class="views-grid hidden">
            <!-- 顶视图 -->
            <div class="view-card">
                <canvas id="canvasTop" class="output-canvas"></canvas>
                <button class="btn" style="color:#000; font-size:11px; padding:10px;" onclick="download('canvasTop', '顶视图')">保存顶视图</button>
            </div>
            <!-- 正视图 -->
            <div class="view-card">
                <canvas id="canvasFront" class="output-canvas"></canvas>
                <button class="btn" style="color:#000; font-size:11px; padding:10px;" onclick="download('canvasFront', '正视图')">保存正视图</button>
            </div>
            <!-- 侧视图 -->
            <div class="view-card">
                <canvas id="canvasSide" class="output-canvas"></canvas>
                <button class="btn" style="color:#000; font-size:11px; padding:10px;" onclick="download('canvasSide', '侧视图')">保存侧视图</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.staticfile.org/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/postprocessing/OutlinePass.js"></script>

<script>
    const PARTICLE_COUNT = 15000; 
    let bgScene, bgCamera, bgRenderer, bgParticles, bgControls;
    let targetPositions = new Float32Array(PARTICLE_COUNT * 3);
    let isModelMode = false;

    function initBgSystem() {
        const canvas = document.getElementById('bg-canvas');
        const wrap = document.getElementById('canvas-wrap');
        bgRenderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        bgRenderer.setPixelRatio(window.devicePixelRatio);
        bgRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
        bgScene = new THREE.Scene();
        bgCamera = new THREE.PerspectiveCamera(40, wrap.clientWidth / wrap.clientHeight, 1, 5000);
        bgCamera.position.set(0, 0, 1100);
        bgControls = new THREE.OrbitControls(bgCamera, wrap);
        bgControls.enableDamping = true;
        bgControls.autoRotate = true;

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 2000;
            targetPositions[i] = positions[i];
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color: 0x3b82f6, size: 2.2, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending });
        bgParticles = new THREE.Points(geometry, material);
        bgScene.add(bgParticles);

        function animate() {
            requestAnimationFrame(animate);
            const posAttr = bgParticles.geometry.attributes.position;
            const speed = isModelMode ? 0.08 : 0.02;
            for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
                posAttr.array[i] += (targetPositions[i] - posAttr.array[i]) * speed;
            }
            posAttr.needsUpdate = true;
            bgControls.update();
            bgRenderer.render(bgScene, bgCamera);
        }
        animate();
    }

    window.adjustOrientation = (type) => {
        if (!isModelMode) return;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let x = targetPositions[i * 3], y = targetPositions[i * 3 + 1], z = targetPositions[i * 3 + 2];
            if (type === 'flip') { targetPositions[i * 3 + 1] = -y; targetPositions[i * 3 + 2] = -z; }
            else if (type === 'rotX') { targetPositions[i * 3 + 1] = z; targetPositions[i * 3 + 2] = -y; }
            else if (type === 'rotY') { targetPositions[i * 3] = z; targetPositions[i * 3 + 2] = -x; }
        }
        bgCamera.position.set(0, 0, 1100); bgControls.target.set(0, 0, 0);
    };

    function transformToModel(model) {
        const points = [];
        model.traverse(child => { if (child.isMesh) {
            const pos = child.geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const v = new THREE.Vector3().fromBufferAttribute(pos, i);
                v.applyMatrix4(child.matrixWorld); points.push(v);
            }
        }});
        const box = new THREE.Box3().setFromPoints(points);
        const center = box.getCenter(new THREE.Vector3()), size = box.getSize(new THREE.Vector3());
        const wrap = document.getElementById('canvas-wrap');
        const scale = (wrap.clientHeight * 0.8) / Math.max(size.x, size.y, size.z);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const step = Math.floor(points.length / PARTICLE_COUNT) || 1;
            const p = points[(i * step) % points.length].clone().sub(center);
            targetPositions[i * 3] = p.x * scale;
            targetPositions[i * 3 + 1] = p.y * scale;
            targetPositions[i * 3 + 2] = p.z * scale;
        }
        isModelMode = true;
        bgParticles.material.color.setHex(0xffffff);
        document.getElementById('hudTools').classList.remove('hidden');
    }

    const fileInput = document.getElementById('fileInput'), uploadCard = document.getElementById('uploadCard'), 
          editCard = document.getElementById('editCard'), viewArea = document.getElementById('viewArea'), loader = document.getElementById('loader');

    let modelInfo = { sx: 0, sy: 0, sz: 0, zoom: 1 }, rawImages = { top: null, front: null, side: null };

    uploadCard.onclick = () => fileInput.click();
    window.ondragover = (e) => { e.preventDefault(); uploadCard.style.borderColor = "#3b82f6"; };
    window.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if (!file || !file.name.toLowerCase().endsWith('.glb')) return;
        loader.style.display = 'flex';
        const offRenderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        offRenderer.setSize(1200, 1200); offRenderer.setClearColor(0x000000, 1);
        const offScene = new THREE.Scene(), offCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
        const composer = new THREE.EffectComposer(offRenderer);
        composer.addPass(new THREE.RenderPass(offScene, offCamera));
        const outlinePass = new THREE.OutlinePass(new THREE.Vector2(1200, 1200), offScene, offCamera);
        outlinePass.edgeStrength = 15; outlinePass.edgeThickness = 2.5; outlinePass.visibleEdgeColor.set('#ffffff');
        composer.addPass(outlinePass);

        const gltfLoader = new THREE.GLTFLoader();
        gltfLoader.parse(await file.arrayBuffer(), '', async (gltf) => {
            const model = gltf.scene;
            transformToModel(model); 
            const meshes = [];
            model.traverse(c => { if(c.isMesh) { c.material = new THREE.MeshBasicMaterial({color:0x000000}); meshes.push(c); } });
            outlinePass.selectedObjects = meshes;
            const box = new THREE.Box3().setFromObject(model), size = box.getSize(new THREE.Vector3());
            model.position.sub(box.getCenter(new THREE.Vector3())); offScene.add(model);
            const zoom = Math.max(size.x, size.y, size.z) * 1.3;
            modelInfo = { sx: size.x, sy: size.y, sz: size.z, zoom: zoom };
            offCamera.left = -zoom/2; offCamera.right = zoom/2; offCamera.top = zoom/2; offCamera.bottom = -zoom/2;
            offCamera.updateProjectionMatrix();

            const capture = async (x, y, z) => {
                offCamera.position.set(x, y, z); offCamera.lookAt(0, 0, 0);
                composer.render(); composer.render();
                const cvs = document.createElement('canvas');
                cvs.width = 1200; cvs.height = 1200;
                const ctx = cvs.getContext('2d'); ctx.filter = 'invert(1)'; ctx.drawImage(offRenderer.domElement, 0, 0);
                return cvs;
            };
            rawImages.top = await capture(0, zoom*2, 0);
            rawImages.front = await capture(0, 0, zoom*2);
            rawImages.side = await capture(zoom*2, 0, 0);

            renderAll("", "", ""); 
            loader.style.display = 'none';
            editCard.classList.remove('hidden'); viewArea.classList.remove('hidden');
        });
    }

    document.getElementById('generateBtn').onclick = () => {
        const L = document.getElementById('valL').value, W = document.getElementById('valW').value, H = document.getElementById('valH').value;
        renderAll(L, W, H);
    };

    function renderAll(L, W, H) {
        drawView('canvasTop', rawImages.top, modelInfo.sx, modelInfo.sz, L, W);
        drawView('canvasFront', rawImages.front, modelInfo.sx, modelInfo.sy, L, H);
        drawView('canvasSide', rawImages.side, modelInfo.sz, modelInfo.sy, W, H);
    }

    function drawView(cvsId, img, dX, dY, vX, vY) {
        const cvs = document.getElementById(cvsId);
        cvs.width = 1200; cvs.height = 1200;
        const ctx = cvs.getContext('2d');
        ctx.fillStyle = "white"; ctx.fillRect(0,0,1200,1200);
        ctx.drawImage(img, 0, 0);
        if(!vX && !vY) return;
        const p = 1200 / modelInfo.zoom, w = dX * p, h = dY * p;
        const l = (1200-w)/2, r = (1200+w)/2, t = (1200-h)/2, b = (1200+h)/2;
        ctx.strokeStyle = "#000"; ctx.fillStyle = "#000"; ctx.lineWidth = 4; ctx.font = "bold 35px Arial";
        if(vX){
            const y = b + 80; ctx.beginPath(); ctx.moveTo(l, b+10); ctx.lineTo(l, y+20); ctx.moveTo(r, b+10); ctx.lineTo(r, y+20);
            ctx.moveTo(l, y); ctx.lineTo(r, y); ctx.stroke(); ctx.textAlign="center"; ctx.fillText(vX, 600, y-15);
        }
        if(vY){
            const x = l - 80; ctx.beginPath(); ctx.moveTo(l-10, t); ctx.lineTo(x-20, t); ctx.moveTo(l-10, b); ctx.lineTo(x-20, b);
            ctx.moveTo(x, t); ctx.lineTo(x, b); ctx.stroke();
            ctx.save(); ctx.translate(x-20, 600); ctx.rotate(-Math.PI/2); ctx.textAlign="center"; ctx.fillText(vY, 0, 0); ctx.restore();
        }
    }

    window.download = (id, name) => {
        const a = document.createElement('a');
        a.download = `${name}_${Date.now()}.png`; a.href = document.getElementById(id).toDataURL(); a.click();
    };

    window.onload = initBgSystem;
    window.onresize = () => { 
        const wrap = document.getElementById('canvas-wrap');
        bgRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
        bgCamera.aspect = wrap.clientWidth / wrap.clientHeight;
        bgCamera.updateProjectionMatrix();
    };
</script>

</body>
</html>
